<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event System</title>

<style>
body{
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding:20px;
}

button{
  padding:6px 12px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  margin:5px;
}

input{
  width:60px;
  padding:5px;
}

table{
  margin:auto;
  border-collapse:collapse;
  margin-top:20px;
}

td, th{
  border:1px solid white;
  padding:10px;
}
</style>

</head>

<body>

<h1>Event Timing & Scoring</h1>

<button onclick="startTimer()">Start Event</button>
<h2 id="timer">Time: 0s</h2>

<h2>Team Panel</h2>
<table id="panel">
<tr>
  <th>Team</th>
  <th>Score</th>
  <th>Action</th>
  <th>Time</th>
</tr>
</table>

<button onclick="updateScores()">Update Scores</button>

<h2>Leaderboard</h2>
<div id="board"></div>

<script>

const teams = [
  "Team 1","Team 2","Team 3","Team 4","Team 5",
  "Team 6","Team 7","Team 8","Team 9","Team 10"
];

let startTime = 0;
let timerInterval;
let data = [];

// START TIMER
function startTimer(){

  startTime = Date.now();

  timerInterval = setInterval(()=>{
    let t = Math.floor((Date.now() - startTime)/1000);
    document.getElementById("timer").innerText = "Time: " + t + "s";
  },1000);
}

// LOAD PANEL
function loadPanel(){

  let table = document.getElementById("panel");

  teams.forEach((team,i)=>{

    let row = table.insertRow();

    row.innerHTML = `
      <td>${team}</td>
      <td><input type="number" id="score${i}" placeholder="-"></td>
      <td><button id="btn${i}" onclick="finishTeam(${i})">Finish</button></td>
      <td id="time${i}">-</td>
    `;
  });
}

// FINISH TEAM → SAVE ONLY TIME
function finishTeam(i){

  let time = Math.floor((Date.now() - startTime)/1000);

  document.getElementById("time"+i).innerText = time + "s";

  document.getElementById("btn"+i).disabled = true;

  data.push({
    team: teams[i],
    time: time,
    score: null // 🔥 score later
  });

  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
}

// UPDATE SCORES LATER
function updateScores(){

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  data.forEach((row,i)=>{
    let val = document.getElementById("score"+i)?.value;

    if(val !== ""){
      row.score = parseInt(val);
    }
  });

  localStorage.setItem("scores", JSON.stringify(data));

  loadBoard();
}

// LOAD LEADERBOARD
function loadBoard(){

  let data = JSON.parse(localStorage.getItem("scores")) || [];

  let html = "<table><tr><th>Team</th><th>Score</th><th>Time</th></tr>";

  let hasScores = data.some(d => d.score !== null);

  data.sort((a,b)=>{

    if(hasScores){
      if((b.score||0)!==(a.score||0)){
        return (b.score||0)-(a.score||0);
      }
      return a.time - b.time;
    } else {
      return a.time - b.time;
    }

  });

  data.forEach(row=>{
    html += `<tr>
      <td>${row.team}</td>
      <td>${row.score ?? "-"}</td>
      <td>${row.time}</td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("board").innerHTML = html;
}

// INIT
window.onload = function(){
  loadPanel();
  loadBoard();
};

</script>

</body>
</html>
